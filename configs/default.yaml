# Unified configuration for the OTTO multi-target recommendation project.
#
# Naming rules:
#   - Intermediate event/label tables use .parquet.
#   - Prediction and submission files use .csv.
#   - Recall matrices and id mappings use .pkl.
#   - Artifact names are short because the old single-target pipeline has been removed.

data:
  nrows: 100000          # Number of sessions to read from the raw jsonl file.
  history_ratio: 0.8     # Prefix ratio used as session history when building validation data.

covis:
  session_limit: 30      # Latest N items per session used to build co-visitation pairs.
  top_k: 20              # Number of neighbors kept for each item.

dssm:
  embedding_dim: 128
  epochs: 20
  batch_size: 256
  lr: 0.001
  weight_decay: 0.00001
  max_pairs: 100000
  retrieval_backend: torch  # torch = exact matrix search; faiss = optional vector index search.

eval:
  k: 20
  type_weights:
    clicks: 0.10
    carts: 0.30
    orders: 0.60

fusion:
  popular: 1.0
  covisitation: 2.0
  dssm: 5.0
